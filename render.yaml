# Render Blueprint — deploy with "New > Blueprint Instance"
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: startup-erp
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: startup-erp-db
          property: connectionString
      - key: DB_TYPE
        value: postgresql
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.6"

databases:
  - name: startup-erp-db
    plan: free
    region: oregon
    databaseName: startup_erp
    user: erp_user
