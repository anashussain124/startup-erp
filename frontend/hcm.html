<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCM — Startup ERP</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar"></div>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>👥 Human Capital Management</h1>
                    <p class="header-subtitle">Employee management, attendance, payroll & performance</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-ghost btn-sm" onclick="exportReport('pdf')">📄 PDF</button>
                    <button class="btn btn-ghost btn-sm" onclick="exportReport('excel')">📊 Excel</button>
                    <button class="btn btn-primary btn-sm" onclick="openModal('add-emp-modal')">+ Add Employee</button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex gap-1 mb-3">
                <button class="btn btn-ghost btn-sm tab-btn active" onclick="switchTab('employees')">Employees</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('attendance')">Attendance</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('payroll')">Payroll</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('performance')">Performance</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('predictions')">🤖 Attrition ML</button>
            </div>

            <!-- Employee Table -->
            <div id="employees-tab">
                <div class="table-card">
                    <div class="table-header"><h3>Employee Directory</h3></div>
                    <div id="emp-table-body"><div class="loading-overlay"><div class="spinner"></div></div></div>
                </div>
            </div>

            <!-- Attendance -->
            <div id="attendance-tab" class="hidden">
                <div class="table-card">
                    <div class="table-header"><h3>Attendance Records</h3></div>
                    <div id="att-table-body"><div class="loading-overlay"><div class="spinner"></div></div></div>
                </div>
            </div>

            <!-- Payroll -->
            <div id="payroll-tab" class="hidden">
                <div class="table-card">
                    <div class="table-header"><h3>Payroll Records</h3></div>
                    <div id="pay-table-body"><div class="loading-overlay"><div class="spinner"></div></div></div>
                </div>
            </div>

            <!-- Performance -->
            <div id="performance-tab" class="hidden">
                <div class="table-card">
                    <div class="table-header"><h3>Performance Reviews</h3></div>
                    <div id="perf-table-body"><div class="loading-overlay"><div class="spinner"></div></div></div>
                </div>
            </div>

            <!-- ML Predictions -->
            <div id="predictions-tab" class="hidden">
                <div class="charts-grid">
                    <div class="prediction-card">
                        <h3>🤖 Employee Attrition Predictor</h3>
                        <p class="text-muted mb-2" style="font-size:0.8rem;">Enter employee features to predict attrition risk</p>
                        <form id="attrition-form" onsubmit="predictAttrition(event)">
                            <div class="form-row">
                                <div class="form-group"><label>Salary ($)</label><input type="number" class="form-control" id="ml-salary" value="55000" required></div>
                                <div class="form-group"><label>Tenure (years)</label><input type="number" step="0.1" class="form-control" id="ml-tenure" value="2" required></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Performance (1-5)</label><input type="number" step="0.1" min="1" max="5" class="form-control" id="ml-perf" value="3.0" required></div>
                                <div class="form-group"><label>Overtime Hours</label><input type="number" step="0.1" class="form-control" id="ml-overtime" value="5" required></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Satisfaction (1-5)</label><input type="number" step="0.1" min="1" max="5" class="form-control" id="ml-satisfaction" value="3.5" required></div>
                                <div class="form-group"><label>Num Projects</label><input type="number" min="1" class="form-control" id="ml-projects" value="4" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width:100%;">Predict Attrition Risk</button>
                        </form>
                        <div id="attrition-result" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Employee Modal -->
    <div class="modal-overlay" id="add-emp-modal">
        <div class="modal">
            <div class="modal-header"><h3>Add Employee</h3><button class="modal-close" onclick="closeModal('add-emp-modal')">✕</button></div>
            <div class="modal-body">
                <form id="add-emp-form" onsubmit="addEmployee(event)">
                    <div class="form-row">
                        <div class="form-group"><label>Employee Code</label><input type="text" class="form-control" id="emp-code" required></div>
                        <div class="form-group"><label>Email</label><input type="email" class="form-control" id="emp-email" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>First Name</label><input type="text" class="form-control" id="emp-fname" required></div>
                        <div class="form-group"><label>Last Name</label><input type="text" class="form-control" id="emp-lname" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Department</label>
                            <select class="form-control" id="emp-dept">
                                <option>Engineering</option><option>Marketing</option><option>Sales</option>
                                <option>HR</option><option>Finance</option><option>Operations</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Position</label><input type="text" class="form-control" id="emp-pos" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Salary</label><input type="number" class="form-control" id="emp-salary" required></div>
                        <div class="form-group"><label>Hire Date</label><input type="date" class="form-control" id="emp-hire" required></div>
                    </div>
                    <div class="modal-footer" style="padding:16px 0 0 0;border-top:none;">
                        <button type="button" class="btn btn-ghost" onclick="closeModal('add-emp-modal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Employee</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/hcm.js"></script>
</body>
</html>
