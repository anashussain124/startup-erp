<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Startup ERP</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-container">
    <div class="auth-card">
        <h1 style="text-align: center; font-size: 1.5rem;">Startup ERP</h1>
        <p style="text-align: center; margin-bottom: 2rem;">Intelligent ERP for modern teams</p>
        <div id="auth-form">
            <div class="form-group">
                <label id="login-label">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Password</label>
                    <button id="forgot-password" class="btn-link" style="font-size: 0.8rem; color: var(--primary); border: none; background: none; cursor: pointer;">Forgot password?</button>
                </div>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div id="register-fields" style="display: none; margin-top: 1rem;">
                 <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full_name" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="company_name" placeholder="Acme Corp">
                </div>
            </div>

            <button id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; margin-bottom: 1rem;">Sign In</button>
            <button id="toggle-auth" class="btn" style="width: 100%; border: none; font-size: 0.9rem; color: var(--primary);">Don't have an account? Sign up</button>
        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
