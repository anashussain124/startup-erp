<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Startup ERP System — Intelligent enterprise resource planning with ML-powered predictions">
    <title>Login — Startup ERP</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-icon">⚡</div>
            <h1>StartupERP</h1>
            <p class="subtitle">Intelligence-powered enterprise platform</p>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary" style="width:100%;margin-top:8px;">
                    Sign In
                </button>
            </form>

            <div class="mt-3 text-center">
                <p class="text-muted" style="font-size:0.75rem;">
                    Demo accounts: <strong>admin</strong> / admin123 &nbsp;·&nbsp; <strong>manager</strong> / manager123 &nbsp;·&nbsp; <strong>employee</strong> / employee123
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // If already logged in, redirect
        if (API.isAuthenticated()) {
            window.location.href = '/static/dashboard.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const data = await API.post('/auth/login', {
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                });

                API.setToken(data.access_token);
                API.setUser({ user_id: data.user_id, username: data.username, role: data.role });
                window.location.href = '/static/dashboard.html';
            } catch (err) {
                showToast(err.message || 'Login failed', 'error');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
