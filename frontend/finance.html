<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance — Startup ERP</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar"></div>
        <main class="main-content">
            <div class="page-header">
                <div><h1>💰 Finance</h1><p class="header-subtitle">Revenue, expenses, and profit analysis</p></div>
                <div class="header-actions">
                    <button class="btn btn-ghost btn-sm" onclick="exportReport('pdf')">📄 PDF</button>
                    <button class="btn btn-ghost btn-sm" onclick="exportReport('excel')">📊 Excel</button>
                </div>
            </div>

            <div class="flex gap-1 mb-3">
                <button class="btn btn-ghost btn-sm tab-btn active" onclick="switchTab('revenue')">Revenue</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('expenses')">Expenses</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('forecast')">🤖 Revenue Forecast</button>
            </div>

            <div id="revenue-tab">
                <div class="table-card">
                    <div class="table-header"><h3>Revenue Records</h3>
                        <button class="btn btn-primary btn-sm" onclick="openModal('add-rev-modal')">+ Add Revenue</button>
                    </div>
                    <div id="rev-table"><div class="loading-overlay"><div class="spinner"></div></div></div>
                </div>
            </div>

            <div id="expenses-tab" class="hidden">
                <div class="table-card">
                    <div class="table-header"><h3>Expense Records</h3>
                        <button class="btn btn-primary btn-sm" onclick="openModal('add-exp-modal')">+ Add Expense</button>
                    </div>
                    <div id="exp-table"><div class="loading-overlay"><div class="spinner"></div></div></div>
                </div>
            </div>

            <div id="forecast-tab" class="hidden">
                <div class="charts-grid">
                    <div class="prediction-card">
                        <h3>🤖 Revenue Forecaster</h3>
                        <form onsubmit="predictRevenue(event)">
                            <div class="form-row">
                                <div class="form-group"><label>Month (1-12)</label><input type="number" class="form-control" id="ml-month" min="1" max="12" value="4" required></div>
                                <div class="form-group"><label>Previous Revenue ($)</label><input type="number" class="form-control" id="ml-prev-rev" value="120000" required></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Total Expenses ($)</label><input type="number" class="form-control" id="ml-exp" value="80000" required></div>
                                <div class="form-group"><label>Headcount</label><input type="number" class="form-control" id="ml-head" value="30" required></div>
                            </div>
                            <div class="form-group"><label>Marketing Spend ($)</label><input type="number" class="form-control" id="ml-mkt" value="15000" required></div>
                            <button type="submit" class="btn btn-primary" style="width:100%;">Forecast Revenue</button>
                        </form>
                        <div id="revenue-result" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Revenue Modal -->
    <div class="modal-overlay" id="add-rev-modal">
        <div class="modal">
            <div class="modal-header"><h3>Add Revenue</h3><button class="modal-close" onclick="closeModal('add-rev-modal')">✕</button></div>
            <div class="modal-body">
                <form onsubmit="addRevenue(event)">
                    <div class="form-group"><label>Source</label>
                        <select class="form-control" id="rev-source"><option>product_sales</option><option>services</option><option>subscriptions</option><option>consulting</option></select>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Amount</label><input type="number" step="0.01" class="form-control" id="rev-amount" required></div>
                        <div class="form-group"><label>Date</label><input type="date" class="form-control" id="rev-date" required></div>
                    </div>
                    <div class="form-group"><label>Description</label><input type="text" class="form-control" id="rev-desc"></div>
                    <div class="modal-footer" style="padding:16px 0 0;border-top:none;">
                        <button type="button" class="btn btn-ghost" onclick="closeModal('add-rev-modal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Add Expense Modal -->
    <div class="modal-overlay" id="add-exp-modal">
        <div class="modal">
            <div class="modal-header"><h3>Add Expense</h3><button class="modal-close" onclick="closeModal('add-exp-modal')">✕</button></div>
            <div class="modal-body">
                <form onsubmit="addExpense(event)">
                    <div class="form-group"><label>Category</label>
                        <select class="form-control" id="exp-cat"><option>payroll</option><option>rent</option><option>marketing</option><option>utilities</option><option>supplies</option><option>other</option></select>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Amount</label><input type="number" step="0.01" class="form-control" id="exp-amount" required></div>
                        <div class="form-group"><label>Date</label><input type="date" class="form-control" id="exp-date" required></div>
                    </div>
                    <div class="form-group"><label>Description</label><input type="text" class="form-control" id="exp-desc"></div>
                    <div class="modal-footer" style="padding:16px 0 0;border-top:none;">
                        <button type="button" class="btn btn-ghost" onclick="closeModal('add-exp-modal')">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/command-palette.js"></script>
    <script src="js/finance.js"></script>
</body>
</html>
