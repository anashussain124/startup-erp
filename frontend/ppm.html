<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — Startup ERP</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar"></div>
        <main class="main-content">
            <div class="page-header">
                <div><h1>🎯 Project Portfolio</h1><p class="header-subtitle">Projects, tasks & ML risk assessment</p></div>
                <div class="header-actions">
                    <button class="btn btn-ghost btn-sm" onclick="exportReport('pdf')">📄 PDF</button>
                    <button class="btn btn-ghost btn-sm" onclick="exportReport('excel')">📊 Excel</button>
                </div>
            </div>
            <div class="flex gap-1 mb-3">
                <button class="btn btn-ghost btn-sm tab-btn active" onclick="switchTab('projects')">Projects</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('tasks')">Tasks</button>
                <button class="btn btn-ghost btn-sm tab-btn" onclick="switchTab('risk')">🤖 Risk Predictor</button>
            </div>
            <div id="projects-tab">
                <div class="table-card"><div class="table-header"><h3>All Projects</h3></div><div id="proj-table"><div class="loading-overlay"><div class="spinner"></div></div></div></div>
            </div>
            <div id="tasks-tab" class="hidden">
                <div class="table-card"><div class="table-header"><h3>All Tasks</h3></div><div id="task-table"><div class="loading-overlay"><div class="spinner"></div></div></div></div>
            </div>
            <div id="risk-tab" class="hidden">
                <div class="charts-grid">
                    <div class="prediction-card">
                        <h3>🤖 Project Risk Predictor</h3>
                        <form onsubmit="predictRisk(event)">
                            <div class="form-row">
                                <div class="form-group"><label>Budget Usage (%)</label><input type="number" class="form-control" id="ml-budget" value="85" required></div>
                                <div class="form-group"><label>Task Completion (%)</label><input type="number" class="form-control" id="ml-tasks" value="40" required></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Days Remaining</label><input type="number" class="form-control" id="ml-days" value="15" required></div>
                                <div class="form-group"><label>Team Size</label><input type="number" class="form-control" id="ml-team" value="5" required></div>
                            </div>
                            <div class="form-row">
                                <div class="form-group"><label>Scope Changes</label><input type="number" class="form-control" id="ml-scope" value="3" required></div>
                                <div class="form-group"><label>Complexity (1-10)</label><input type="number" step="0.1" min="1" max="10" class="form-control" id="ml-complex" value="7" required></div>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width:100%;">Assess Risk</button>
                        </form>
                        <div id="risk-result" class="mt-2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/ppm.js"></script>
</body>
</html>
