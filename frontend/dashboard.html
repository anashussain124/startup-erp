<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ERP Dashboard — Key performance indicators and analytics">
    <title>Dashboard — Startup ERP</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar"></div>
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Dashboard</h1>
                    <p class="header-subtitle">Real-time overview of your startup operations</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-ghost btn-sm" onclick="loadDashboard()">🔄 Refresh</button>
                    <button class="btn btn-primary btn-sm" onclick="window.open(API.BASE_URL + '/docs', '_blank')">📖 API Docs</button>
                </div>
            </div>

            <!-- KPI Cards -->
            <div class="kpi-grid" id="kpi-grid">
                <div class="loading-overlay"><div class="spinner"></div></div>
            </div>

            <!-- Charts Row 1 -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>📈 Revenue vs Expenses Trend</h3>
                    <div class="chart-container"><canvas id="revExpChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>🍩 Expenses by Category</h3>
                    <div class="chart-container"><canvas id="expCatChart"></canvas></div>
                </div>
            </div>

            <!-- Charts Row 2 -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>🏗️ Project Status</h3>
                    <div class="chart-container"><canvas id="projChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <h3>🔄 Lead Pipeline</h3>
                    <div class="chart-container"><canvas id="leadChart"></canvas></div>
                </div>
            </div>

            <!-- Charts Row 3 -->
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>🏢 Department Headcount</h3>
                    <div class="chart-container"><canvas id="deptChart"></canvas></div>
                </div>
                <div class="chart-card prediction-card">
                    <h3>🤖 ML Predictions Summary</h3>
                    <div id="ml-summary" class="loading-overlay"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
