<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Startup ERP</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav>
        <div style="font-weight: 700; font-size: 1.2rem;">Startup ERP</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="documents.html">Documents</a>
            <a href="ai.html">Ask AI</a>
            <a href="#" id="logout-link">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1 id="welcome-msg">Welcome</h1>
        <p>Your intelligent business command center.</p>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-top: 2rem;">
            <div class="card">
                <h3>Knowledge Base</h3>
                <p id="doc-usage">Docs: 0/5</p>
                <a href="documents.html" class="btn btn-primary">Upload Files</a>
            </div>
            <div class="card">
                <h3>AI Insights</h3>
                <p id="ai-usage">Queries: 0/10 Today</p>
                <a href="ai.html" class="btn btn-primary">Ask AI</a>
            </div>
            <div class="card">
                <h3>Account Plan</h3>
                <p id="plan-type">Free Plan</p>
                <button class="btn" onclick="alert('Subscription management coming soon!')">Upgrade</button>
            </div>
        </div>

        <div style="margin-top: 3rem;">
            <h2>AI Proactive Insights</h2>
            <div id="insights-panel" style="margin-top: 1rem;">
                <p>Loading intelligence...</p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script>
        async function loadDashboard() {
            const user = await checkAuth();
            document.getElementById('welcome-msg').textContent = `Welcome back, ${user.full_name || 'User'}`;
            
            const token = localStorage.getItem('supabase_session') ? JSON.parse(localStorage.getItem('supabase_session')).access_token : null;
            
            // Load Billing Stats
            const statsRes = await fetch(`${CONFIG.API_BASE_URL}/billing/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const stats = await statsRes.json();
            
            document.getElementById('doc-usage').textContent = `Docs: ${stats.docs_used}/${stats.docs_limit}`;
            document.getElementById('ai-usage').textContent = `Queries: ${stats.ai_queries_today}/${stats.ai_limit} Today`;
            document.getElementById('plan-type').textContent = `${stats.plan.toUpperCase()} Plan`;

            // Load Proactive Insights
            const insightsRes = await fetch(`${CONFIG.API_BASE_URL}/insights/latest`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const insights = await insightsRes.json();
            
            const panel = document.getElementById('insights-panel');
            if (insights.length === 0) {
                panel.innerHTML = '<p style="color: var(--text-muted);">No insights yet. Upload documents or ask AI questions to generate intelligence.</p>';
                return;
            }

            panel.innerHTML = '';
            insights.forEach(ins => {
                const item = document.createElement('div');
                item.className = 'card';
                item.style.borderLeft = ins.is_alert ? '4px solid #ef4444' : '4px solid var(--primary)';
                item.innerHTML = `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span style="font-weight: 700; font-size: 0.9rem; text-transform: uppercase;">${ins.title}</span>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">${new Date(ins.created_at).toLocaleDateString()}</span>
                    </div>
                    <p style="margin-bottom: 0.8rem;">${ins.content}</p>
                    ${ins.action_item ? `<div style="font-size: 0.9rem; font-weight: 600; color: var(--primary);">Next Step: ${ins.action_item}</div>` : ''}
                `;
                panel.appendChild(item);
            });
        }
        loadDashboard();
    </script>
</body>
</html>
